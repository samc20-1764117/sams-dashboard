<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#fdf8f4">
<link rel="manifest" href="mobile-manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<title>Sam's Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="mobile.css">
<script>(function(){try{var s=JSON.parse(localStorage.getItem('samdash_v7')||'{}');if(s.cfg&&s.cfg.dark)document.documentElement.classList.add('init-dark');}catch(e){}})();</script>
</head>
<body>

<!-- Login -->
<div id="mLogin">
  <div class="card">
    <h2>Sam's Dashboard</h2>
    <input id="mEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="mPass" type="password" placeholder="Password" autocomplete="current-password">
    <div id="mLoginErr"></div>
    <button onclick="mDoLogin()">Sign in</button>
  </div>
</div>

<!-- App -->
<div id="mApp">
  <div id="mHeader">
    <div>
      <h1 id="mHeaderTitle">Today</h1>
      <div id="mDateLbl"></div>
    </div>
    <span id="mProgress" class="m-prog"></span>
    <button class="m-reload-btn" onclick="location.reload(true)" title="Reload app">↻</button>
  </div>
  <div id="mPTR"><div class="m-ptr-spinner"></div><span id="mPTRLbl">Pull to refresh</span></div>
  <div id="mMain">

    <!-- Today tab -->
    <div id="mTodayPage">
      <div id="mTodaySection" class="m-section">
        <div class="m-section-hd"><span>Tasks</span><button class="m-section-hd-add" onclick="mOpenFullAdd()" aria-label="Add task">+</button></div>
        <div id="mTodayList"></div>
      </div>
    </div>

    <!-- Timeblock tab -->
    <div id="mTBPage" style="display:none">
      <div id="mUnassignedBar"></div>
      <div id="mTLScroll">
        <div id="mTLInner">
          <div id="mTLLabels"></div>
          <div id="mTLCol"></div>
        </div>
      </div>
    </div>

    <!-- Week tab -->
    <div id="mWeekPage" style="display:none">
      <div id="mWeekNav">
        <button class="m-wk-nav-btn" onclick="mWeekPrev()">‹</button>
        <span id="mWeekRangeLbl">This Week</span>
        <button class="m-wk-nav-btn" onclick="mWeekNext()">›</button>
      </div>
      <div id="mWeekList"></div>
    </div>

  </div>

  <!-- Add task bar (today tab only) -->
  <div id="mAddBar">
    <input id="mNewTask" type="text" placeholder="Add task for today…" onkeydown="if(event.key==='Enter')mAddTask()">
    <div class="m-add-row2">
      <div class="m-cpick" id="mAddPick">
        <button type="button" class="m-cpick-btn" onclick="mTogglePick('add')">
          <span class="m-cpick-dot" id="mAddPickDot"></span>
          <span id="mAddPickLbl">Home</span>
          <span class="m-cpick-arr">▾</span>
        </button>
        <div class="m-cpick-opts" id="mAddPickOpts"></div>
      </div>
      <button id="mAddFlagBtn" onclick="mToggleAddFlag()" aria-label="Flag important" title="Flag important">⚑</button>
      <button id="mAddBtn" onclick="mAddTask()">Add</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="mNav">
    <button class="m-nav-btn" onclick="mShowTab('today')">Today</button>
    <button class="m-nav-btn active" onclick="mShowTab('tb')">Timeblock</button>
    <button class="m-nav-btn" onclick="mShowTab('week')">Week</button>
  </nav>
</div>

<!-- Edit task sheet -->
<div id="mEditBackdrop" onclick="mCloseEdit()"></div>
<div id="mEditSheet">
  <h3>Edit Task</h3>
  <input id="mEditName" type="text" placeholder="Task name" onkeydown="if(event.key==='Enter')mSaveEditTask()">
  <input id="mEditDue" type="date" style="margin-bottom:10px">
  <div class="m-cpick" id="mEditPick" style="margin-bottom:12px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('edit')">
      <span class="m-cpick-dot" id="mEditPickDot"></span>
      <span id="mEditPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mEditPickOpts"></div>
  </div>
  <div class="m-imp-row">
    <label>Important</label>
    <button type="button" class="m-imp-toggle" id="mEditImpBtn" onclick="mToggleEditImp()">off</button>
  </div>
  <div class="m-edit-actions">
    <button id="mEditDel" onclick="mDeleteEditTask()">Delete</button>
    <button id="mEditSave" onclick="mSaveEditTask()">Save</button>
  </div>
</div>

<!-- Block edit/create sheet -->
<div id="mBlockBackdrop" onclick="mCloseBlock()"></div>
<div id="mBlockSheet">
  <h3 id="mBlockSheetTitle">Add Block</h3>
  <input id="mBlockName" type="text" placeholder="Block title" onkeydown="if(event.key==='Enter')mSaveBlock()">
  <div class="m-block-row">
    <input id="mBlockTime" type="time" class="m-time-inp">
    <div class="m-dur-btns">
      <button class="m-dur-btn" data-dur="30" onclick="mSetDur(30)">30m</button>
      <button class="m-dur-btn" data-dur="45" onclick="mSetDur(45)">45m</button>
      <button class="m-dur-btn" data-dur="60" onclick="mSetDur(60)">1h</button>
      <button class="m-dur-btn" data-dur="90" onclick="mSetDur(90)">1.5h</button>
      <button class="m-dur-btn" data-dur="120" onclick="mSetDur(120)">2h</button>
    </div>
  </div>
  <div class="m-cpick" id="mBlockPick" style="margin-bottom:16px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('block')">
      <span class="m-cpick-dot" id="mBlockPickDot"></span>
      <span id="mBlockPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mBlockPickOpts"></div>
  </div>
  <div class="m-edit-actions">
    <button id="mBlockDel" onclick="mDeleteBlock()">Delete</button>
    <button id="mBlockSave" onclick="mSaveBlock()">Save</button>
  </div>
</div>

<!-- Week day add sheet -->
<div id="mWkAddBackdrop" onclick="mCloseWkAdd()"></div>
<div id="mWkAddSheet">
  <h3 id="mWkAddTitle">Add Task</h3>
  <input id="mWkAddName" type="text" placeholder="Task name" onkeydown="if(event.key==='Enter')mSaveWkTask()">
  <div class="m-cpick" id="mWkAddPick" style="margin-bottom:16px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('wkadd')">
      <span class="m-cpick-dot" id="mWkAddPickDot"></span>
      <span id="mWkAddPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mWkAddPickOpts"></div>
  </div>
  <button id="mWkAddSave" onclick="mSaveWkTask()">Add Task</button>
</div>

<!-- Full add sheet (today) -->
<div id="mFullAddBackdrop" onclick="mCloseFullAdd()"></div>
<div id="mFullAddSheet">
  <h3>Add Task</h3>
  <input id="mFullAddName" type="text" placeholder="Task name" onkeydown="if(event.key==='Enter')mSaveFullAdd()">
  <input id="mFullAddDue" type="date" style="margin-bottom:10px">
  <div class="m-cpick" id="mFullAddPick" style="margin-bottom:12px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('fulladd')">
      <span class="m-cpick-dot" id="mFullAddPickDot"></span>
      <span id="mFullAddPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mFullAddPickOpts"></div>
  </div>
  <div class="m-imp-row">
    <label>Important</label>
    <button type="button" class="m-imp-toggle" id="mFullAddImpBtn" onclick="mToggleFullAddImp()">off</button>
  </div>
  <button id="mFullAddSave" onclick="mSaveFullAdd()">Add Task</button>
</div>

<!-- Hidden undo scaffolding (required by core.js pushUndo) -->
<div id="undoToast" style="display:none!important"><span id="undoMsg"></span><button id="redoBtn"></button></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="core.js"></script>
<script src="features.js"></script>
<script src="mobile-overview.js"></script>
</body></html>
