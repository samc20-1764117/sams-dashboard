<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Dashboard">
<meta name="theme-color" content="#fdf8f4">
<link rel="manifest" href="mobile-manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
<title>Sam's Dashboard</title>
<script>
// Inline cache-buster: if the served HTML is stale, force a FRESH network fetch by
// navigating to a versioned URL (a URL iOS has never cached — plain reload() can be
// served straight back out of the iOS PWA app-shell cache and never update).
(function(){
  window._BUILD='20260707a';var BUILD=window._BUILD;
  try{
    var qs=new URLSearchParams(location.search);
    fetch('/mobile-version.json?_='+Date.now(),{cache:'no-store'}).then(function(r){return r.json()}).then(function(d){
      if(!d.v||d.v===BUILD)return;        // already fresh
      if(qs.get('b')===d.v)return;        // already tried this version this navigation — stop, no loop
      qs.set('b',d.v);
      location.replace(location.pathname+'?'+qs.toString());
    }).catch(function(){});
  }catch(e){}
})();
</script>
<link rel="stylesheet" href="fonts/dmsans.css?v=1">
<link rel="stylesheet" href="mobile.css?v=20260705b">
<script>(function(){try{var s=JSON.parse(localStorage.getItem('samdash_v7')||'{}');if(s.cfg&&s.cfg.dark)document.documentElement.classList.add('init-dark');}catch(e){}})();</script>
</head>
<body>

<!-- Login -->
<div id="mLogin">
  <form class="card" onsubmit="event.preventDefault();mDoLogin();return false">
    <h2>Sam's Dashboard</h2>
    <input id="mEmail" type="email" placeholder="Email" autocomplete="email">
    <input id="mPass" type="password" placeholder="Password" autocomplete="current-password">
    <div id="mLoginErr"></div>
    <button type="submit">Sign in</button>
  </form>
</div>

<!-- App -->
<div id="mApp">
  <div id="mHeader">
    <div>
      <h1 id="mHeaderTitle">Today</h1>
      <div id="mDateLbl"></div>
    </div>
    <div style="display:flex;align-items:center;gap:4px">
      <span id="mProgress" class="m-prog"></span>
      <button id="mMonthBtn" class="m-month-btn" onclick="mOpenMonth()" style="display:none">Month</button>
      <button class="m-reload-btn" onclick="location.reload(true)" title="Reload app">↻</button>
    </div>
  </div>
  <div id="mPTR"><div class="m-ptr-spinner"></div><span id="mPTRLbl">Pull to refresh</span></div>
  <div id="mMain">

    <!-- Today tab -->
    <div id="mTodayPage">
      <div id="mTodaySection" class="m-section">
        <div class="m-section-hd"><span>Tasks</span><button class="m-section-hd-add" onclick="mOpenFullAdd()" aria-label="Add task">+</button></div>
        <div id="mTodayList"></div>
      </div>
    </div>

    <!-- Timeblock tab -->
    <div id="mTBPage" style="display:none">
      <div id="mUnassignedBar"></div>
      <div id="mTLScroll">
        <div id="mTLInner">
          <div id="mTLLabels"></div>
          <div id="mTLCol"></div>
        </div>
      </div>
    </div>

    <!-- Week tab -->
    <div id="mWeekPage" style="display:none">
      <div id="mWeekList"></div>
    </div>

    <!-- Shop tab -->
    <div id="mShopPage" style="display:none">
      <div class="m-shop-header">
        <span id="mShopCount">Shopping</span>
      </div>
      <div id="mShopList"></div>
    </div>

    <!-- Grocery (HEB) tab -->
    <div id="mGrocPage" style="display:none">
      <div class="m-shop-header m-groc-hdr">
        <button class="m-groc-hdr-btn" onclick="mOpenRecipes()" title="Recipes">📖</button>
        <span id="mGrocCount">HEB Grocery</span>
        <button class="m-groc-hdr-btn m-groc-close" onclick="mShowTab('today')" title="Close">✕</button>
      </div>
      <div id="mGrocList"></div>
    </div>

  </div>

  <!-- Add task bar (today tab only) -->
  <div id="mAddBar">
    <input id="mNewTask" type="text" placeholder="Add task for today…" onkeydown="if(event.key==='Enter')mAddTask()">
    <div class="m-add-row2">
      <div class="m-cpick" id="mAddPick">
        <button type="button" class="m-cpick-btn" onclick="mTogglePick('add')">
          <span class="m-cpick-dot" id="mAddPickDot"></span>
          <span id="mAddPickLbl">Home</span>
          <span class="m-cpick-arr">▾</span>
        </button>
        <div class="m-cpick-opts" id="mAddPickOpts"></div>
      </div>
      <button id="mAddFlagBtn" onclick="mToggleAddFlag()" aria-label="Flag important" title="Flag important">⚑</button>
      <button id="mAddBtn" onclick="mAddTask()">Add</button>
    </div>
  </div>

  <!-- Shop add bar (shop tab only) -->
  <div id="mShopAddBar" style="display:none">
    <input id="mShopNewName" type="text" placeholder="Add item..." onkeydown="if(event.key==='Enter')mAddShopItem()">
    <div class="m-add-row2">
      <select id="mShopNewStore" class="m-shop-store-sel">
        <option value="HEB">HEB</option>
        <option value="Ikea">Ikea</option>
        <option value="Online">Online</option>
        <option value="Other">Other</option>
      </select>
      <button id="mShopAddBtn" onclick="mAddShopItem()">Add</button>
    </div>
  </div>

  <!-- Grocery add bar (groc tab only) -->
  <div id="mGrocAddBar" style="display:none">
    <input id="mGrocNewName" type="text" placeholder="Add grocery item..." onkeydown="if(event.key==='Enter')mAddGrocItem()">
    <div class="m-add-row2">
      <button id="mGrocAddBtn" onclick="mAddGrocItem()">Add</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="mNav">
    <button class="m-nav-btn active" onclick="mShowTab('today')">
      <svg class="m-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Today</span>
    </button>
    <button class="m-nav-btn" onclick="mShowTab('tb')">
      <svg class="m-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="10" y1="14" x2="10" y2="20"/></svg>
      <span>Schedule</span>
    </button>
    <button class="m-nav-btn" onclick="mShowTab('week')">
      <svg class="m-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Week</span>
    </button>
    <button class="m-nav-btn" onclick="mShowTab('shop')">
      <svg class="m-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span>Shop</span>
    </button>
    <button class="m-nav-btn" onclick="mShowTab('groc')">
      <svg class="m-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
      <span>HEB</span>
    </button>
  </nav>
</div>

<!-- Edit task sheet -->
<div id="mEditBackdrop" onclick="mCloseEdit()"></div>
<div id="mEditSheet">
  <h3>Edit Task</h3>
  <input id="mEditName" type="text" placeholder="Task name" onkeydown="if(event.key==='Enter')mSaveEditTask()">
  <input id="mEditDue" type="date" style="margin-bottom:10px">
  <div class="m-cpick" id="mEditPick" style="margin-bottom:12px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('edit')">
      <span class="m-cpick-dot" id="mEditPickDot"></span>
      <span id="mEditPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mEditPickOpts"></div>
  </div>
  <div class="m-imp-row">
    <label>Important</label>
    <button type="button" class="m-imp-toggle" id="mEditImpBtn" onclick="mToggleEditImp()">off</button>
  </div>
  <div class="m-edit-actions">
    <button id="mEditDel" onclick="mDeleteEditTask()">Delete</button>
    <button id="mEditSave" onclick="mSaveEditTask()">Save</button>
  </div>
</div>

<!-- Block edit/create sheet -->
<div id="mBlockBackdrop" onclick="mCloseBlock()"></div>
<div id="mBlockSheet">
  <h3 id="mBlockSheetTitle">Add Block</h3>
  <input id="mBlockName" type="text" placeholder="Block title" onkeydown="if(event.key==='Enter')mSaveBlock()">
  <div class="m-block-row">
    <input id="mBlockTime" type="time" class="m-time-inp">
    <div class="m-dur-btns">
      <button class="m-dur-btn" data-dur="30" onclick="mSetDur(30)">30m</button>
      <button class="m-dur-btn" data-dur="45" onclick="mSetDur(45)">45m</button>
      <button class="m-dur-btn" data-dur="60" onclick="mSetDur(60)">1h</button>
      <button class="m-dur-btn" data-dur="90" onclick="mSetDur(90)">1.5h</button>
      <button class="m-dur-btn" data-dur="120" onclick="mSetDur(120)">2h</button>
    </div>
  </div>
  <div class="m-cpick" id="mBlockPick" style="margin-bottom:16px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('block')">
      <span class="m-cpick-dot" id="mBlockPickDot"></span>
      <span id="mBlockPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mBlockPickOpts"></div>
  </div>
  <div class="m-edit-actions">
    <button id="mBlockDel" onclick="mDeleteBlock()">Delete</button>
    <button id="mBlockSave" onclick="mSaveBlock()">Save</button>
  </div>
</div>

<!-- Week day add sheet -->
<div id="mWkAddBackdrop" onclick="mCloseWkAdd()"></div>
<div id="mWkAddSheet">
  <h3 id="mWkAddTitle">Add Task</h3>
  <input id="mWkAddName" type="text" placeholder="Task name" onkeydown="if(event.key==='Enter')mSaveWkTask()">
  <div class="m-cpick" id="mWkAddPick" style="margin-bottom:16px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('wkadd')">
      <span class="m-cpick-dot" id="mWkAddPickDot"></span>
      <span id="mWkAddPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mWkAddPickOpts"></div>
  </div>
  <button id="mWkAddSave" onclick="mSaveWkTask()">Add Task</button>
</div>

<!-- Full add sheet (today) -->
<div id="mFullAddBackdrop" onclick="mCloseFullAdd()"></div>
<div id="mFullAddSheet">
  <h3>Add Task</h3>
  <input id="mFullAddName" type="text" placeholder="Task name" onkeydown="if(event.key==='Enter')mSaveFullAdd()">
  <input id="mFullAddDue" type="date" style="margin-bottom:10px">
  <div class="m-cpick" id="mFullAddPick" style="margin-bottom:12px">
    <button type="button" class="m-cpick-btn" onclick="mTogglePick('fulladd')">
      <span class="m-cpick-dot" id="mFullAddPickDot"></span>
      <span id="mFullAddPickLbl">Home</span>
      <span class="m-cpick-arr">▾</span>
    </button>
    <div class="m-cpick-opts m-cpick-opts--up" id="mFullAddPickOpts"></div>
  </div>
  <div class="m-imp-row">
    <label>Important</label>
    <button type="button" class="m-imp-toggle" id="mFullAddImpBtn" onclick="mToggleFullAddImp()">off</button>
  </div>
  <button id="mFullAddSave" onclick="mSaveFullAdd()">Add Task</button>
</div>

<!-- Shop edit sheet -->
<div id="mShopEditBackdrop" onclick="mCloseShopEdit()"></div>
<div id="mShopEditSheet">
  <h3>Edit Item</h3>
  <input id="mShopEditName" type="text" placeholder="Item name" onkeydown="if(event.key==='Enter')mSaveShopEdit()">
  <select id="mShopEditStore" class="m-shop-store-sel" style="margin-bottom:10px">
    <option value="HEB">HEB</option>
    <option value="Ikea">Ikea</option>
    <option value="Online">Online</option>
    <option value="Other">Other</option>
  </select>
  <input id="mShopEditDue" type="date" style="margin-bottom:10px">
  <input id="mShopEditTime" type="time" style="margin-bottom:12px">
  <div class="m-edit-actions">
    <button id="mShopEditDel" onclick="mDeleteShopItem()">Delete</button>
    <button id="mShopEditSave" onclick="mSaveShopEdit()">Save</button>
  </div>
</div>

<!-- Recipe picker sheet -->
<div id="mRecipeBackdrop" onclick="mCloseRecipes()"></div>
<div id="mRecipeSheet" class="m-recipe-sheet"></div>

<!-- Month view modal -->
<div id="mMonthBackdrop" onclick="mCloseMonth()"></div>
<div id="mMonthSheet">
  <div id="mMonthNav">
    <button class="m-mo-nav-btn" onclick="mMonthPrev()">&lsaquo;</button>
    <span id="mMonthTitle" onclick="mToggleYearView()"></span>
    <button class="m-mo-nav-btn" onclick="mMonthNext()">&rsaquo;</button>
  </div>
  <div id="mYearView" style="display:none"></div>
  <div id="mMonthGrid"></div>
  <div id="mMonthDetail"></div>
</div>

<!-- Hidden undo scaffolding (required by core.js pushUndo) -->
<div id="undoToast" style="display:none!important"><span id="undoMsg"></span><button id="redoBtn"></button></div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/mobile-sw.js').then(function(reg){
    try{reg.update();}catch(e){}
    // Re-check for a newer worker every time the app is reopened/foregrounded.
    document.addEventListener('visibilitychange',function(){ if(!document.hidden){ try{reg.update();}catch(e){} } });
  }).catch(function(){});
}
</script>
<script src="supabase.min.js?v=2110"></script>
<script src="core.js?v=20260707a"></script>
<script src="features.js?v=20260707a"></script>
<script src="mobile-overview.js?v=20260707a"></script>
</body></html>
